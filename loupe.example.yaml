org: acme-eng

git_host:
  provider: bitbucket-cloud
  base_url: https://api.bitbucket.org/2.0
  username: you@example.com
  # Bitbucket app password is prompted at every `loupe baseline` invocation.
  #
  # Alternative providers:
  #
  # GitHub (PAT covers both git host and tracker if both are github):
  #   provider: github
  #   base_url: https://api.github.com
  #
  # GitLab (cloud or self-hosted; a single PAT covers both roles):
  #   provider: gitlab
  #   base_url: https://gitlab.com         # or https://gitlab.acme.com
  #
  # Azure DevOps (cloud or Server; PAT covers both roles):
  #   provider: azuredevops
  #   base_url: https://dev.azure.com      # or https://devops.acme.com/tfs
  #   username: myorg                      # Azure organization name

tracker:
  provider: jira-cloud
  site: acme.atlassian.net
  email: you@example.com
  # Jira API token is prompted at every `loupe baseline` invocation.
  #
  # Alternatives:
  #   provider: github   (project keys = "owner/repo")
  #   provider: gitlab
  #     base_url: https://gitlab.com       # match the git_host base_url
  #     # project keys = "group/.../project" (path_with_namespace)
  #   provider: linear   (project keys = team key, e.g. "ENG")
  #   provider: azuredevops
  #     base_url: https://dev.azure.com
  #     site: myorg                        # Azure org (optional if git_host is also azuredevops)

teams:
  - name: platform
    members: [alice@acme.com, bob@acme.com]
  - name: product
    members: [carol@acme.com, dan@acme.com]

ai_adoption:
  # auto-detect by default; uncomment to pin manually
  # cutover_date: 2026-03-15
  detection:
    co_author_trailers: true
    body_footers: true
    bot_authors: true
    # Squash-merge recovery costs one extra API call per PR; turn off
    # if you're rate-limited on a huge org.
    squash_merge_recovery: true
    # Seat inference is the only detector that infers rather than
    # observes — it propagates direct evidence to other commits the
    # same author made in the same week and repo. Off by default.
    seat_inference: false
    # Labels and branch prefixes are case-insensitive. The defaults
    # below are baked in when these lists are empty; override here to
    # add org-specific patterns.
    pr_labels: [ai-generated, ai-assisted, copilot, claude, cursor, aider, devin, jules, gemini]
    branch_prefixes: ["copilot/", "cursor/", "claude/", "aider/", "devin/", "jules/"]
  min_weekly_commits_for_cutover: 0.05

cycle_time:
  # Tracker status names (case-insensitive) that mark "development started".
  # The first transition INTO any of these defines idea→dev. Tickets without
  # a matching transition fall back to the timestamp of their first linked
  # commit.
  dev_started_statuses: [In Progress, In Development, In Review, Code Review]

windows:
  baseline_weeks: 12
  comparison_weeks: 12

output:
  path: ./reports
